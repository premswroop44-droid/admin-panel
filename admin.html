<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:system-ui;
background:
radial-gradient(circle at top,#dbeafe 0%,transparent 25%),
linear-gradient(180deg,#eef4ff,#e9eef8);
color:#0f172a;
}

.navbar{
background:linear-gradient(90deg,#1d4ed8,#4f46e5);
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:800;
letter-spacing:.3px;
box-shadow:0 12px 30px rgba(37,99,235,.22);
}

.container{
padding:24px 16px 40px;
max-width:1100px;
margin:auto;
}

.section-title{
margin:22px 0 10px;
font-size:26px;
font-weight:800;
color:#1e293b;
}

.card{
background:rgba(255,255,255,.88);
padding:18px;
border-radius:22px;
margin-bottom:18px;
border:1px solid rgba(255,255,255,.7);
box-shadow:0 18px 32px rgba(15,23,42,.08);
backdrop-filter:blur(10px);
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:520px;
}

th, td{
padding:12px 10px;
border-bottom:1px solid #e8eef9;
text-align:left;
}

th{
background:linear-gradient(135deg,#4f46e5,#2563eb);
color:white;
font-size:14px;
letter-spacing:.2px;
}

.btn{
padding:12px 16px;
border:none;
border-radius:14px;
cursor:pointer;
color:white;
font-weight:700;
font-size:14px;
box-shadow:0 12px 22px rgba(34,197,94,.18);
}

.btn-edit{
background:linear-gradient(135deg,#22c55e,#16a34a);
}

.pin-row{
display:grid;
grid-template-columns:1fr 160px 130px;
gap:12px;
align-items:center;
padding:14px 0;
border-bottom:1px solid #e8eef9;
}

.pin-row input,
.form-grid input{
padding:10px 12px;
border:1px solid #d7e3ff;
border-radius:14px;
background:#f8fbff;
font-size:15px;
box-sizing:border-box;
outline:none;
}

.form-grid{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:12px;
align-items:end;
}

.field{
display:flex;
flex-direction:column;
gap:8px;
}

.field label{
font-size:14px;
font-weight:700;
color:#475569;
}

#activityList p{
margin:0;
padding:12px 14px;
border-radius:14px;
background:#f8fbff;
border:1px solid #e8eef9;
margin-top:10px;
line-height:1.5;
}

@media (max-width:700px){
.section-title{
font-size:22px;
}

.pin-row{
grid-template-columns:1fr;
}

.form-grid{
grid-template-columns:1fr;
}

.btn{
width:100%;
}
}
</style>
</head>
<body>

<div class="navbar">Admin Panel</div>

<div class="container">
<h2 class="section-title">Bacche List</h2>

<div class="card">
<table id="usersTable">
<tr>
<th>Naam</th>
<th>Class</th>
<th>Phone</th>
<th>Score</th>
</tr>
</table>
</div>

<h2 class="section-title">Admin Group Assign</h2>

<div class="card">
<div class="form-grid">
<div class="field">
<label for="groupAdminName">Admin Name</label>
<input type="text" id="groupAdminName" placeholder="Jaise: hari didi">
</div>
<div class="field">
<label for="groupChildren">Select Bacche</label>
<select id="groupChildren" multiple style="min-height:140px;padding:10px 12px;border:1px solid #d7e3ff;border-radius:14px;background:#f8fbff;"></select>
</div>
<div class="field">
<label>&nbsp;</label>
<button class="btn btn-edit" onclick="saveAdminGroup()">Save Group</button>
</div>
</div>
</div>

<div class="card">
<div id="adminGroupsList"></div>
</div>

<h2 class="section-title">Leaderboard</h2>

<div class="card">
<table id="leaderboard">
<tr>
<th>Rank</th>
<th>Name</th>
<th>Score</th>
</tr>
</table>
</div>

<h2 class="section-title">Kis Kis Ne Jhooth Bola</h2>

<div class="card">
<div id="activityList"></div>
</div>

<h2 class="section-title">Daily Summary</h2>

<div class="card">
<div id="dailySummaryList"></div>
</div>


<h2 class="section-title">Saved Parent PINs</h2>

<div class="card">
<div id="pinsList"></div>
</div>

<h2 class="section-title">Add Challenge</h2>

<div class="card">
<div class="form-grid">
<div class="field">
<label for="challengeTitle">Challenge Name</label>
<input type="text" id="challengeTitle" placeholder="Challenge Name">
 </div>
<div class="field">
<label for="challengePoints">Points</label>
<input type="number" id="challengePoints" placeholder="Points">
</div>
<div class="field">
<label>&nbsp;</label>
<button class="btn btn-edit" onclick="addChallenge()">Add Challenge</button>
</div>
</div>
</div>
</div>

<script type="module">
import { initAdminPage, addChallenge, changePin, loadPins, loadChildrenOptions, saveAdminGroup, loadAdminGroups } from "./firebase.js";

window.addChallenge = addChallenge;
window.changePin = changePin;
window.saveAdminGroup = saveAdminGroup;

initAdminPage();
loadPins();
loadChildrenOptions();
loadAdminGroups();
</script>

</body>
</html>
